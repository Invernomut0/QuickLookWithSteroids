name: OmniPreview
options:
  bundleIdPrefix: com.omnipreview
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: true
    DEAD_CODE_STRIPPING: true

packages:
  OmniPreviewCore:
    path: Core

# UTIs handled by the Quick Look extensions. Types macOS does not know
# (safetensors, gguf, generic sqlite) are imported by the host app below.
targetTemplates:
  QLExtension:
    type: app-extension
    platform: macOS
    dependencies:
      - package: OmniPreviewCore
        product: OmniPreviewCore
      - package: OmniPreviewCore
        product: OmniPreviewUI

targets:
  OmniPreview:
    type: application
    platform: macOS
    sources: [App]
    resources:
      - path: App/Assets.xcassets
        type: folder
    dependencies:
      - package: OmniPreviewCore
        product: OmniPreviewCore
      - package: OmniPreviewCore
        product: OmniPreviewUI
      - target: PreviewExtension
        embed: true
      - target: ThumbnailExtension
        embed: true
    entitlements:
      path: App/OmniPreview.entitlements
      properties:
        com.apple.security.app-sandbox: true
        # read-write so the annotation editor can export via NSSavePanel
        com.apple.security.files.user-selected.read-write: true
        # required for Gumroad license verification
        com.apple.security.network.client: true
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: OmniPreview
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "0.3.5"
        CFBundleVersion: "8"
        NSHumanReadableCopyright: "© 2026 Invernomuto — MIT License"
        LSMinimumSystemVersion: "13.0"
        LSApplicationCategoryType: public.app-category.utilities
        LSUIElement: true
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.omnipreview.safetensors
            UTTypeDescription: Safetensors Model
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [safetensors]
          - UTTypeIdentifier: com.omnipreview.gguf
            UTTypeDescription: GGUF Model
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [gguf]
          - UTTypeIdentifier: com.omnipreview.sqlite
            UTTypeDescription: SQLite Database
            UTTypeConformsTo: [public.data, public.database]
            UTTypeTagSpecification:
              public.filename-extension: [sqlite, sqlite3, db]
          - UTTypeIdentifier: com.omnipreview.woff
            UTTypeDescription: Web Open Font Format
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [woff, woff2]
          - UTTypeIdentifier: com.omnipreview.npy
            UTTypeDescription: NumPy Array
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [npy, npz]
          - UTTypeIdentifier: com.omnipreview.onnx
            UTTypeDescription: ONNX Model
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [onnx]
          - UTTypeIdentifier: com.omnipreview.texture
            UTTypeDescription: Texture Image
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [qoi, dds, tga, ktx, ktx2, hdr]
          - UTTypeIdentifier: com.omnipreview.datafile
            UTTypeDescription: Scientific Data File
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [parquet, arrow, feather, duckdb, h5, hdf5, nc, mat, fits]
          - UTTypeIdentifier: com.omnipreview.diskimage
            UTTypeDescription: VM Disk Image
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [qcow2, vmdk, vhdx]
          - UTTypeIdentifier: com.omnipreview.cad
            UTTypeDescription: CAD Drawing
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [dxf, dwg, step, stp, iges, igs]
          - UTTypeIdentifier: com.omnipreview.tfstate
            UTTypeDescription: Terraform State
            UTTypeConformsTo: [public.json]
            UTTypeTagSpecification:
              public.filename-extension: [tfstate]
          - UTTypeIdentifier: com.omnipreview.fb2
            UTTypeDescription: FictionBook eBook
            UTTypeConformsTo: [public.xml]
            UTTypeTagSpecification:
              public.filename-extension: [fb2]
          - UTTypeIdentifier: com.omnipreview.mobi
            UTTypeDescription: Kindle eBook
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [mobi, azw3]
          - UTTypeIdentifier: com.omnipreview.shapefile
            UTTypeDescription: ESRI Shapefile
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [shp]
          - UTTypeIdentifier: com.omnipreview.kml
            UTTypeDescription: KML / KMZ Document
            UTTypeConformsTo: [public.xml, public.data]
            UTTypeTagSpecification:
              public.filename-extension: [kml, kmz]
          # ── Source code: types macOS doesn't know ─────────────────────────
          - UTTypeIdentifier: com.omnipreview.typescript
            UTTypeDescription: TypeScript Source
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [ts, tsx, jsx]
          - UTTypeIdentifier: com.omnipreview.ruby
            UTTypeDescription: Ruby Script
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [rb]
          - UTTypeIdentifier: com.omnipreview.php
            UTTypeDescription: PHP Script
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [php]
          - UTTypeIdentifier: com.omnipreview.csharp
            UTTypeDescription: C# Source
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [cs]
          - UTTypeIdentifier: com.omnipreview.go
            UTTypeDescription: Go Source
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [go]
          - UTTypeIdentifier: com.omnipreview.rs
            UTTypeDescription: Rust Source
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [rs]
          - UTTypeIdentifier: com.omnipreview.kt
            UTTypeDescription: Kotlin Source
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [kt, kts]
          - UTTypeIdentifier: com.omnipreview.lua
            UTTypeDescription: Lua Script
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [lua]
          - UTTypeIdentifier: com.omnipreview.scss
            UTTypeDescription: SCSS Stylesheet
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [scss, sass, less]
          - UTTypeIdentifier: com.omnipreview.terraform
            UTTypeDescription: Terraform Configuration
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [tf, tfvars, hcl]
          - UTTypeIdentifier: com.omnipreview.nix
            UTTypeDescription: Nix Expression
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [nix]
          - UTTypeIdentifier: com.omnipreview.sql
            UTTypeDescription: SQL Script
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [sql]
          - UTTypeIdentifier: com.omnipreview.graphql
            UTTypeDescription: GraphQL
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [graphql, gql]
          - UTTypeIdentifier: com.omnipreview.dart
            UTTypeDescription: Dart Source
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [dart]
          - UTTypeIdentifier: com.omnipreview.scala
            UTTypeDescription: Scala Source
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [scala]
          - UTTypeIdentifier: com.omnipreview.swift-package-manifest
            UTTypeDescription: Swift Package Manifest
            UTTypeConformsTo: [public.source-code]
            UTTypeTagSpecification:
              public.filename-extension: [resolved]
          # ── Config & text: types macOS doesn't know ────────────────────────
          - UTTypeIdentifier: com.omnipreview.toml
            UTTypeDescription: TOML Configuration
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [toml]
          - UTTypeIdentifier: com.omnipreview.ini
            UTTypeDescription: INI Configuration
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [ini, cfg, conf, cnf, properties, editorconfig, desktop, gitconfig]
          - UTTypeIdentifier: com.omnipreview.env
            UTTypeDescription: Environment Variables
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [env]
          - UTTypeIdentifier: com.omnipreview.log
            UTTypeDescription: Log File
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [log]
          - UTTypeIdentifier: com.omnipreview.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [md, markdown, mdown, mkd]
          # ── Archives without standard Apple UTIs ──────────────────────────
          - UTTypeIdentifier: com.omnipreview.cbz
            UTTypeDescription: Comic Book Archive
            UTTypeConformsTo: [public.zip-archive]
            UTTypeTagSpecification:
              public.filename-extension: [cbz]
          - UTTypeIdentifier: com.omnipreview.jar
            UTTypeDescription: Java Archive
            UTTypeConformsTo: [public.zip-archive]
            UTTypeTagSpecification:
              public.filename-extension: [jar, war]
          - UTTypeIdentifier: com.omnipreview.apk
            UTTypeDescription: Android Package
            UTTypeConformsTo: [public.zip-archive]
            UTTypeTagSpecification:
              public.filename-extension: [apk]
          - UTTypeIdentifier: com.omnipreview.ipa
            UTTypeDescription: iOS App Package
            UTTypeConformsTo: [public.zip-archive]
            UTTypeTagSpecification:
              public.filename-extension: [ipa]
          - UTTypeIdentifier: com.omnipreview.dump
            UTTypeDescription: Database Dump
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [dump]
          - UTTypeIdentifier: com.omnipreview.deb
            UTTypeDescription: Debian Package
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [deb]
          # ── ML / data without standard Apple UTIs ─────────────────────────
          - UTTypeIdentifier: com.omnipreview.pytorch
            UTTypeDescription: PyTorch Checkpoint
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [pt, pth]
          - UTTypeIdentifier: com.omnipreview.geojson
            UTTypeDescription: GeoJSON
            UTTypeConformsTo: [public.json]
            UTTypeTagSpecification:
              public.filename-extension: [geojson]

  PreviewExtension:
    templates: [QLExtension]
    sources: [PreviewExtension]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.omnipreview.OmniPreview.PreviewExtension
    entitlements:
      path: PreviewExtension/PreviewExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
    info:
      path: PreviewExtension/Info.plist
      properties:
        CFBundleDisplayName: OmniPreview Preview
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PreviewViewController
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - public.zip-archive
              - com.pkware.zip-archive
              - public.tar-archive
              - org.gnu.gnu-zip-archive
              - org.gnu.gnu-zip-tar-archive
              - org.7-zip.7-zip-archive
              - com.rarlab.rar-archive
              - org.tukaani.xz-archive
              - public.bzip2-archive
              - public.iso-image
              - com.omnipreview.sqlite
              - com.omnipreview.safetensors
              - com.omnipreview.gguf
              - com.omnipreview.onnx
              - com.omnipreview.npy
              - com.omnipreview.texture
              - com.omnipreview.datafile
              - com.omnipreview.diskimage
              - com.omnipreview.cad
              - com.omnipreview.tfstate
              - com.omnipreview.fb2
              - com.omnipreview.mobi
              - com.omnipreview.shapefile
              - org.idpf.epub-container
              - com.bittorrent.torrent
              - public.x509-certificate
              - public.truetype-font
              - public.truetype-ttf-font
              - public.opentype-font
              - com.omnipreview.woff
              - public.png
              - public.mpeg-4
              - com.apple.quicktime-movie
              - com.apple.m4v-video
              # macOS maps .ts to mpeg-2-transport-stream by default; we
              # override the rendering inside our pipeline based on content.
              - public.mpeg-2-transport-stream
              - public.avi
              - public.mp3
              - com.apple.m4a-audio
              - com.microsoft.waveform-audio
              - org.xiph.flac
              - org.xiph.ogg-audio
              - org.webmproject.webm
              - public.heic
              - public.heif
              - public.webp
              - org.webmproject.webp
              - public.avif
              - com.apple.icns
              - com.microsoft.ico
              - public.yaml
              - com.apple.disk-image-udif
              - public.folder
              # ── Source code ───────────────────────────────────────────────
              # QL does NOT follow UTI conformance: each UTI must be listed
              # explicitly. public.source-code is kept as a broad fallback.
              - public.source-code
              # Apple-assigned UTIs for specific languages (verified with mdls)
              - public.python-script          # .py
              - public.swift-source           # .swift
              - public.shell-script           # .sh .bash .zsh
              - com.netscape.javascript-source # .js
              - com.sun.java-source           # .java
              - public.c-source               # .c
              - public.c-plus-plus-source     # .cpp .cc
              - public.c-header               # .h
              - public.c-plus-plus-header     # .hpp
              - public.objective-c-source     # .m
              - public.objc-plus-plus-source  # .mm
              - public.script                 # generic scripts
              - public.ruby-script            # .rb
              - public.php-script             # .php
              - com.microsoft.typescript      # .tsx on some macOS versions
              # Specific Apple UTIs that DON'T inherit from public.source-code
              - public.json
              - public.xml
              - public.html
              - public.css
              - public.plain-text
              - com.apple.xcode.strings-text
              # ── Markdown ──────────────────────────────────────────────────
              - net.daringfireball.markdown
              - com.omnipreview.markdown
              # ── Custom source code UTIs (no Apple UTI exists) ─────────────
              - com.omnipreview.typescript
              - com.omnipreview.ruby
              - com.omnipreview.php
              - com.omnipreview.csharp
              - com.omnipreview.go
              - com.omnipreview.rs
              - com.omnipreview.kt
              - com.omnipreview.lua
              - com.omnipreview.scss
              - com.omnipreview.terraform
              - com.omnipreview.nix
              - com.omnipreview.sql
              - com.omnipreview.graphql
              - com.omnipreview.dart
              - com.omnipreview.scala
              # ── Config & text ─────────────────────────────────────────────
              - com.omnipreview.toml
              # macOS resolves .cfg and .toml to public.toml.
              - public.toml
              - com.omnipreview.ini
              - com.microsoft.ini
              - com.apple.log
              - com.omnipreview.env
              - com.omnipreview.log
              # Extensionless text files often resolve as public.data.
              # The renderer pipeline decides whether they are text/binary.
              - public.data
              # ── Archives (additional) ─────────────────────────────────────
              - com.omnipreview.cbz
              - com.omnipreview.jar
              - com.omnipreview.apk
              - com.omnipreview.ipa
              - com.omnipreview.dump
              - com.omnipreview.deb
              - public.archive.apk
              - com.sun.java-archive
              - com.sun.web-application-archive
              - com.apple.itunes.ipa
              - com.android.apk
              # ── Documents ─────────────────────────────────────────────────
              - com.adobe.pdf
              - org.openxmlformats.wordprocessingml.document
              - org.openxmlformats.spreadsheetml.sheet
              - org.openxmlformats.presentationml.presentation
              - org.oasis-open.opendocument.text
              - org.oasis-open.opendocument.spreadsheet
              - org.oasis-open.opendocument.presentation
              - com.microsoft.word.doc
              - com.microsoft.excel.xls
              - com.microsoft.powerpoint.ppt
              - org.iso.sql
              # ── eBooks ────────────────────────────────────────────────────
              - org.idpf.epub-container
              - com.omnipreview.mobi
              - com.omnipreview.fb2
              # ── Images ────────────────────────────────────────────────────
              - public.jpeg
              - public.tiff
              - public.gif
              - com.compuserve.gif
              - com.adobe.photoshop-image
              # ── GIS ───────────────────────────────────────────────────────
              - public.geojson
              - com.omnipreview.geojson
              - com.google.earth.kml
              - com.omnipreview.kml
              # ── ML / Scientific ───────────────────────────────────────────
              - com.omnipreview.pytorch
              - com.omnipreview.swift-package-manifest
              # ── Security ──────────────────────────────────────────────────
              - com.rsa.pkcs-12
            QLSupportsSearchableItems: false

  ThumbnailExtension:
    templates: [QLExtension]
    sources: [ThumbnailExtension]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.omnipreview.OmniPreview.ThumbnailExtension
    entitlements:
      path: ThumbnailExtension/ThumbnailExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
    info:
      path: ThumbnailExtension/Info.plist
      properties:
        CFBundleDisplayName: OmniPreview Thumbnails
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.thumbnail
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ThumbnailProvider
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - com.omnipreview.sqlite
              - com.omnipreview.safetensors
              - com.omnipreview.gguf
              - com.omnipreview.npy
              - com.omnipreview.woff
              - com.microsoft.ini
              - public.toml
              - com.omnipreview.toml
              - com.google.earth.kml
              - com.omnipreview.kml
              - public.data
            QLThumbnailMinimumDimension: 0
